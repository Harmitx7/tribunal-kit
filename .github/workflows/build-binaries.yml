name: Build & Release Rust Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: tribunal-core-win-x64.exe
            binary: tribunal-core.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: tribunal-core-win-arm64.exe
            binary: tribunal-core.exe
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: tribunal-core-darwin-x64
            binary: tribunal-core
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: tribunal-core-darwin-arm64
            binary: tribunal-core
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tribunal-core-linux-x64
            binary: tribunal-core
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tribunal-core-linux-arm64
            binary: tribunal-core

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate Checksums
        run: sha256sum tribunal-core-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tribunal-core-win-x64.exe
            tribunal-core-win-arm64.exe
            tribunal-core-darwin-x64
            tribunal-core-darwin-arm64
            tribunal-core-linux-x64
            tribunal-core-linux-arm64
            checksums.txt
          generate_release_notes: true
